models:
  - - { layer_type: linear,
        out_features: 10,
        bias: True,
        activation: torch.nn.LeakyReLU(),
  }
    - { layer_type: layer_norm }
    - { layer_type: invariant_based_convolution ,
        bias: True,
        activation: torch.nn.Identity(),
        heads: [
          {
            num: 1,
            bias: True,
            labels: {
              head: { label_type: induced_cycles, min_cycle_length: 6 , max_cycle_length: 6 },
              tail: { label_type: induced_cycles, min_cycle_length: 6 , max_cycle_length: 6 },
             bias: { label_type: primary },
            },
            properties:
              { name: distances, values: [1 ] },
          },
          {
            num: 1,
            bias: True,
            labels: {
              head: { label_type: simple_cycles, min_cycle_length: 6 , max_cycle_length: 6 },
              tail: { label_type: simple_cycles, min_cycle_length: 6 , max_cycle_length: 6 },
             bias: { label_type: primary },
            },
            properties:
              { name: distances, values: [1 ] },
          },
        ],
    }
    - { layer_type: linear,
        out_features: 10,
        bias: True,
        activation: torch.nn.LeakyReLU(),
      }
    - { layer_type: layer_norm }
    - { layer_type: invariant_based_aggregation,
        activation: torch.nn.Identity(),
        bias: True,
        out_dim: 10,
        heads: [
          {
            bias: True,
            labels: { label_type: [induced_cycles, primary], min_cycle_length: 6 , max_cycle_length: 6 },
          },
          {
            bias: True,
            labels: { label_type: [induced_cycles, primary], min_cycle_length: 7 , max_cycle_length: 7 },
          },
      ],
    }
    - { layer_type: linear,
        out_features: 100,
        bias: True,
        activation: torch.nn.LeakyReLU(),
    }
    - { layer_type: layer_norm }
    - { layer_type: linear,
        out_features: 100,
        bias: True,
        activation: torch.nn.LeakyReLU(),
    }
    - { layer_type: linear,
        out_features: 1,
        bias: True,
        activation: torch.nn.Identity(),
    }
    - { layer_type: reshape }

