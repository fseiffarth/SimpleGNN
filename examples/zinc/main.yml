# main configuration file for running a basic graph classification experiment using the GIN and GCN models on the MUTAG dataset from the TUDataset collection.
datasets:
  - {
    # all the options are mandatory (paths should be relative to the PYTHONPATH path)
    name: "ZINC", # dataset name
    source: "ZINC",  # dataset source type
    task: "graph_regression", # task type
    paths: {
      data: "data/ZINC/", # path to the dataset (will be downloaded if not present)
      labels: "data/ZINC/labels/", # path to the labels
      properties: "data/ZINC/properties/", # path to the precomputed properties
      results: "results/test/ShareGNN/", # path to save the results
      models: "examples/zinc/models_ShareGNN.yml", # path to the model configuration file
      hyperparameters: "examples/zinc/parameters.yml", # path to the hyperparameters configuration file
      splits: "src/datasets/splits/fixed/ZINC_splits.json", # path to the data splits file (contains train/val/test splits)
    }
  }



