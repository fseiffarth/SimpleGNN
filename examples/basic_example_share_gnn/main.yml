# main configuration file for running a basic graph classification experiment using the GIN and GCN models on the MUTAG dataset from the TUDataset collection.
datasets:
  - {
    # all the options are mandatory (paths should be relative to the PYTHONPATH path)
    name: "MUTAG", # dataset name
    source: "TUDataset",  # dataset source type
    task: "graph_classification", # task type
    paths: {
      data: "data/TUDatasets/", # path to the dataset (will be downloaded if not present)
      labels: "data/TUDatasets/labels/", # path to the labels
      properties: "data/TUDatasets/properties/", # path to the precomputed properties
      results: "results/test/ShareGNN/", # path to save the results
      models: "examples/basic_example_share_gnn/models_ShareGNN.yml", # path to the model configuration file
      hyperparameters: "examples/basic_example_share_gnn/parameters.yml", # path to the hyperparameters configuration file
      splits: "src/datasets/splits/standard/MUTAG_splits.json", # path to the data splits file (contains train/val/test splits)
    }
  }



