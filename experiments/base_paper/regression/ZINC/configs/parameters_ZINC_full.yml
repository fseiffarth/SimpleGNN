# Hyperparameters for ZINC (migrated from old monolithic main config).
device: cpu
mode: experiments
precision: double

optimizer:
  - Adam

loss:
  - MAE

# rule_occurrence_threshold: how often a rule must occur to be used in the network
rule_occurrence_threshold: 10

weight_initialization: { convolution: { type: 'lower_upper', value: -0.001 },
                         convolution_bias: { type: 'lower_upper', value: 0.0 },
                         aggregation: { type: 'lower_upper', value: -0.001 },
                         aggregation_bias: { type: 'lower_upper', value: 0.0 } }

batch_size:
  - 128
learning_rate:
  - 0.001
epochs:
  - 150

early_stopping:
  enabled: False
  patience: 25

scheduler: { type: 'ReduceLROnPlateau', factor: 0.5, patience: 5, min_lr: 0.00001 }

training_data_sampling: { type: 'default' }

input_features: { name: node_labels, transformation: 'one_hot' }
best_model: True
