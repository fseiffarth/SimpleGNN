# ZINC graph-regression experiment (migrated to the three-tier schema).
# NOTE: the original paper config (main_config_ZINC_full.yml) referenced
# network_ZINC.yml, not network_ZINC_full.yml. We keep that mapping for faithful
# reproduction; network_ZINC_full.yml was already unused and is left migrated but
# orphaned. Switch the `models:` path below if the _full network is intended.
datasets:
  - {
      name: "ZINC-full",
      source: "ZINC",
      task: "graph_regression",
      validation_folds: 1,
      paths: {
        data: "data/ZINC/",
        labels: "data/ZINC/labels/",
        properties: "data/ZINC/properties/",
        results: "results/base_paper/regression/ZINC-full/",
        models: "experiments/base_paper/regression/ZINC/configs/network_ZINC.yml",
        hyperparameters: "experiments/base_paper/regression/ZINC/configs/parameters_ZINC_full.yml",
        splits: "src/simplegnn/datasets/splits/fixed/ZINC-full_splits.json",
      }
  }
