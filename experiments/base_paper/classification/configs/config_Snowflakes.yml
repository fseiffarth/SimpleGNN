# Migrated from old-schema network config (see MIGRATION_PLAN.md).
models:
- - layer_type: invariant_based_convolution
    activation: torch.nn.Tanh()
    bias: false
    heads:
    - 1
    labels:
    - label_type:
      - simple_cycles
      - primary
      max_cycle_length:
      - 10
    properties:
    - name: distances
      values:
      - 0
      - 3
  - layer_type: invariant_based_aggregation
    activation: torch.nn.Tanh()
    bias: true
    heads:
    - 1
    labels:
    - label_type:
      - wl
      - primary
      depth:
      - 2
  - layer_type: reshape
