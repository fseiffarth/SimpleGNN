# Migrated from old-schema network config (see MIGRATION_PLAN.md).
models:
- - layer_type: invariant_based_convolution
    activation: torch.nn.Tanh()
    bias: false
    heads:
    - 1
    labels:
    - label_type: simple_cycles
      max_cycle_length:
      - 5
      - 4
      - 3
    - label_type: wl
      depth:
      - 0
      - 1
      - 2
      - 3
      - 4
    - label_type: induced_cycles
      max_cycle_length:
      - 4
      - 5
      - 10
      - 20
    - label_type: cliques
      max_clique_size:
      - 3
      - 4
      - 6
      - 10
      - 20
      - 50
    - label_type: subgraph
      id:
      - 0
      - 1
      - 2
      - 3
    properties:
    - name: distances
      values:
      - 0
      - 1
      - 2
  - layer_type: invariant_based_aggregation
    activation: torch.nn.Tanh()
    bias: true
    heads:
    - 1
    labels:
    - label_type: wl
      depth:
      - 0
      - 1
      - 2
      - 3
      - 4
    - label_type: simple_cycles
      max_cycle_length:
      - 3
      - 4
      - 5
    - label_type: induced_cycles
      max_cycle_length:
      - 4
      - 5
      - 10
      - 20
    - label_type: cliques
      max_clique_size:
      - 3
      - 4
      - 6
      - 10
      - 20
      - 50
  - layer_type: reshape
subgraphs:
- '[nx.complete_graph(4)]'
- '[nx.cycle_graph(3), nx.star_graph(1)]'
- '[nx.cycle_graph(4), nx.star_graph(1)]'
- '[nx.cycle_graph(3), nx.cycle_graph(4), nx.star_graph(1)]'
