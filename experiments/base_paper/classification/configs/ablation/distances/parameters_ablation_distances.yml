# Ablation (distance) hyperparameters (migrated from old monolithic main config).
# NOTE: the original config had no input_features key; the current contract requires
# one. Added the project default (constant 1.0), matching the other TU classification
# configs.
device: cpu
mode: experiments
precision: double

optimizer:
  - Adam

loss:
  - CrossEntropyLoss

convolution_grad: True
aggregation_grad: True

rule_occurrence_threshold: 1

weight_initialization: { convolution: { type: 'constant', value: 0.001 },
                         convolution_bias: { type: 'constant', value: 0.0 },
                         aggregation: { type: 'constant', value: 0.001 },
                         aggregation_bias: { type: 'constant', value: 0.0 } }

batch_size:
  - 64
learning_rate:
  - 0.01
epochs:
  - 200

early_stopping:
  enabled: True
  patience: 25

num_workers: 30
input_features: { name: constant, value: 1.0 }
best_model: True
