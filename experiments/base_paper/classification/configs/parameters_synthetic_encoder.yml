# Synthetic-classification hyperparameters (migrated from old monolithic main config).
device: cpu
mode: experiments
precision: double

optimizer:
  - Adam

loss:
  - CrossEntropyLoss

# learning on/off for the convolutional / aggregation layers
convolution_grad: True
aggregation_grad: False

rule_occurrence_threshold: 1

weight_initialization: { convolution: { type: 'uniform', min: -0.1, max: 0.1 },
                         convolution_bias: { type: 'constant', value: 0.0 },
                         aggregation: { type: 'uniform', min: -0.1, max: 0.1 },
                         aggregation_bias: { type: 'constant', value: 0.0 } }

batch_size:
  - 64
learning_rate:
  - 0.1
epochs:
  - 200

early_stopping:
  enabled: False
  patience: 25

input_features: { name: constant, value: 1.0 }
