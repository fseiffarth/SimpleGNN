# Synthetic classification (decoder only, convolution frozen) (migrated to three-tier schema).
datasets:
  - { name: "CSL",
      source: "gnn_benchmark",
      task: "graph_classification",
      validation_folds: 5,
      paths: { data: "data/Synthetic/", labels: "data/Synthetic/labels/", properties: "data/Synthetic/properties/",
               results: "results/base_paper/classification/Synthetic/Decoder/", models: "experiments/base_paper/classification/configs/config_CSL.yml",
               hyperparameters: "experiments/base_paper/classification/configs/parameters_synthetic_decoder.yml", splits: "experiments/base_paper/splits/synthetic/CSL_splits.json" } }
  - { name: "EvenOddRings2_16",
      source: "generate_from_function",
      generate_function: even_odd_rings,
      generate_function_args: { data_size: 1200, ring_size: 16, difficulty: 2, count: False, seed: 764 },
      task: "graph_classification",
      validation_folds: 10,
      paths: { data: "data/Synthetic/", labels: "data/Synthetic/labels/", properties: "data/Synthetic/properties/",
               results: "results/base_paper/classification/Synthetic/Decoder/", models: "experiments/base_paper/classification/configs/config_EvenOddRings.yml",
               hyperparameters: "experiments/base_paper/classification/configs/parameters_synthetic_decoder.yml", splits: "experiments/base_paper/splits/synthetic/EvenOddRings2_16_splits.json" } }
  - { name: "EvenOddRingsCount16",
      source: "generate_from_function",
      generate_function: even_odd_rings,
      generate_function_args: { data_size: 1200, ring_size: 16, count: True, seed: 764 },
      task: "graph_classification",
      validation_folds: 10,
      paths: { data: "data/Synthetic/", labels: "data/Synthetic/labels/", properties: "data/Synthetic/properties/",
               results: "results/base_paper/classification/Synthetic/Decoder/", models: "experiments/base_paper/classification/configs/config_EvenOddRingsCount.yml",
               hyperparameters: "experiments/base_paper/classification/configs/parameters_synthetic_decoder.yml", splits: "experiments/base_paper/splits/synthetic/EvenOddRingsCount16_splits.json" } }
  - { name: "LongRings100",
      source: "generate_from_function",
      generate_function: long_rings,
      generate_function_args: { data_size: 1200, ring_size: 100, seed: 764 },
      task: "graph_classification",
      validation_folds: 10,
      paths: { data: "data/Synthetic/", labels: "data/Synthetic/labels/", properties: "data/Synthetic/properties/",
               results: "results/base_paper/classification/Synthetic/Decoder/", models: "experiments/base_paper/classification/configs/config_LongRings.yml",
               hyperparameters: "experiments/base_paper/classification/configs/parameters_synthetic_decoder.yml", splits: "experiments/base_paper/splits/synthetic/LongRings100_splits.json" } }
  - { name: "Snowflakes",
      source: "generate_from_function",
      generate_function: snowflakes,
      generate_function_args: { smallest_snowflake: 3, largest_snowflake: 12, flakes_per_size: 100, seed: 764, generation_type: 'binary' },
      task: "graph_classification",
      validation_folds: 10,
      paths: { data: "data/Synthetic/", labels: "data/Synthetic/labels/", properties: "data/Synthetic/properties/",
               results: "results/base_paper/classification/Synthetic/Decoder/", models: "experiments/base_paper/classification/configs/config_Snowflakes.yml",
               hyperparameters: "experiments/base_paper/classification/configs/parameters_synthetic_decoder.yml", splits: "experiments/base_paper/splits/synthetic/Snowflakes_splits.json" } }
