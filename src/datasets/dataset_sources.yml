# Different sources for graph datasets with their urls and additional information
TUDataset:
    url: "https://chrsmrrs.github.io/datasets/"
    description: "A collection of benchmark datasets for graph classification and regression tasks."
    license: "Varies by dataset, see individual dataset pages."
    citation: |
        @inproceedings{morris2020tudataset,
          title={TUDataset: A collection of benchmark datasets for learning with graphs},
          author={Morris, Christopher and Ritzert, Matthias and Fey, Matthias and Hamilton, William L and Lenssen, Jan E and Rattan, Gaurav and Grohe, Martin},
          booktitle={International Conference on Learning Representations},
          year={2020}
        }
QM9:
    url: "https://deepchemdata.s3-us-west-1.amazonaws.com/datasets/qm9.csv"
    description: "A dataset of small molecules with quantum chemical properties."
    license: "CC BY 4.0"
    citation: |
        @article{ramakrishnan2014quantum,
          title={Quantum chemistry structures and properties of 134 kilo molecules},
          author={Ramakrishnan, Raghunathan and Dral, Pavlo O and Rupp, Matthias and von Lilienfeld, O Anatole},
          journal={Scientific data},
          volume={1},
          number={1},
          pages={1--7},
          year={2014},
          publisher={Nature Publishing Group}
        }
ZINC:
    url: "https://zinc15.docking.org/"
    description: "A free database of commercially available compounds for virtual screening."
    license: "Varies by compound, see individual compound pages."
    citation: |
        @article{sterling2015zinc,
          title={ZINC 15--ligand discovery for everyone},
          author={Sterling, Teague and Irwin, John J},
          journal={Journal of chemical information and modeling},
          volume={55},
            number={11},
            pages={2324--2337},
            year={2015},
            publisher={ACS Publications}